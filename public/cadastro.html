<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - Lixeira Necessária</title>
    <link rel="stylesheet" href="css/cadastro.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="cadastro-container">
      <div class="cadastro-card">
        <div class="logo-cadastro">
          <i class="fas fa-leaf"></i>
          <h1>Lixeira Necessária!</h1>
        </div>

        <h2>Crie sua conta</h2>
        <p class="subtitle">Participe da transformação do seu bairro</p>

        <form id="formCadastro">
          <div class="input-group">
            <label>Nome completo</label>
            <input type="text" id="nome" placeholder="Seu nome" required />
          </div>
          <div class="input-group">
            <label>Email</label>
            <input
              type="email"
              id="email"
              placeholder="seu@email.com"
              required
            />
          </div>
          <div class="input-group">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="••••••••" required />
          </div>

          <button type="submit" class="btn-cadastro">Cadastrar</button>
        </form>

        <div class="footer-cadastro">
          <p>Já tem conta? <a href="/login.html">Faça login</a></p>
        </div>
      </div>
    </div>

    <script src="js/cadastro.js"></script>
  </body>
</html>
